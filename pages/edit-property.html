<div class="max-w-4xl mx-auto">
  <div class="mb-8">
    <h1 class="text-2xl md:text-3xl font-semibold text-[var(--text-main)] mb-2">
      Edit Property
    </h1>
    <p class="text-[var(--text-faint)] text-sm">
      View and manage your property listings.
    </p>
  </div>
  <div

          <th

            Property Name

          >
            Action
          </th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100">
        <tr class="hover:bg-gray-50 transition-colors">
          <td class="px-6 py-4 text-sm text-[var(--text-faint)]">1</td>
          <td class="px-6 py-4 text-sm text-[var(--text-main)] font-medium">
            Riverside Deluxe Villa
          </td>
          <td class="px-6 py-4 text-sm text-right">
            <button
              class="text-[var(--color-primary)] hover:text-[var(--color-primary-hover)] transition-colors inline-flex items-center gap-1.5"
            >
              <span class="iconify text-sm" data-icon="lucide:pencil"></span>
              Edit
            </button>
          </td>
        </tr>
        <tr class="hover:bg-gray-50 transition-colors">
          <td class="px-6 py-4 text-sm text-[var(--text-faint)]">2</td>

            >
              <span class="iconify text-sm" data-icon="lucide:pencil"></span>
              Edit
            </button>

        </tr>
        <tr class="hover:bg-gray-50 transition-colors">
          <td class="px-6 py-4 text-sm text-[var(--text-faint)]">3</td>

        <tr class="hover:bg-gray-50 transition-colors">

              class="text-[var(--color-primary)] hover:text-[var(--color-primary-hover)] transition-colors inline-flex items-center gap-1.5"
            >
              <span class="iconify text-sm" data-icon="lucide:pencil"></span>

            </button>
          </td>
        </tr>
