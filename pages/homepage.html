<div class="max-w-3xl mx-auto">
  <div class="mb-8">
    <h1 class="text-2xl md:text-3xl font-semibold text-[var(--text-main)] mb-2">
      Update your content easily
    </h1>
    <p class="text-[var(--text-faint)] text-sm">
      Manage your homepage details from here.
    </p>
  </div>
  <form
    class="space-y-6 bg-[var(--bg-card)] border border-[var(--border-color)] rounded-xl p-6 md:p-8 shadow-sm"
  >
    <div>
      <label class="block text-sm font-medium text-[var(--text-muted)] mb-1.5"
        >Welcome Heading</label
      >
      <input
        type="text"
        placeholder="Enter welcome heading"
        class="form-input w-full rounded-lg px-4 py-2.5 text-sm transition-colors"
      />
    </div>
    <div>
      <label class="block text-sm font-medium text-[var(--text-muted)] mb-1.5"
        >Heading</label
      >
      <input
        type="text"
        placeholder="Enter main heading"
        class="form-input w-full rounded-lg px-4 py-2.5 text-sm transition-colors"
      />
    </div>
    <div>
      <label class="block text-sm font-medium text-[var(--text-muted)] mb-1.5"
        >Content</label
      >
      <textarea
        rows="4"
        placeholder="Enter content..."
        class="form-input w-full rounded-lg px-4 py-2.5 text-sm transition-colors resize-y"
      ></textarea>
    </div>
    <div>
      <label class="block text-sm font-medium text-[var(--text-muted)] mb-1.5"
        >About Heading</label
      >
      <input
        type="text"
        placeholder="Enter about heading"
        class="form-input w-full rounded-lg px-4 py-2.5 text-sm transition-colors"
      />
    </div>
    <div>
      <label class="block text-sm font-medium text-[var(--text-muted)] mb-1.5"
        >About Content</label
      >
      <textarea
        rows="4"
        placeholder="Enter about content..."
        class="form-input w-full rounded-lg px-4 py-2.5 text-sm transition-colors resize-y"
      ></textarea>
    </div>
    <div class="pt-2 flex justify-end">
      <button
        type="submit"
        class="bg-[var(--color-primary)] hover:bg-[var(--color-primary-hover)] text-white px-6 py-2.5 rounded-lg text-sm font-medium transition-colors shadow-sm"
      >
        Save Changes
      </button>
    </div>
  </form>
</div>
