<div class="max-w-3xl mx-auto">
  <div class="mb-8">
    <h1 class="text-2xl md:text-3xl font-semibold text-[var(--text-main)] mb-2">
      Profile
    </h1>
    <p class="text-[var(--text-faint)] text-sm">
      Update your admin profile details.
    </p>
  </div>
  <form
    class="space-y-6 bg-[var(--bg-card)] border border-[var(--border-color)] rounded-xl p-6 md:p-8 shadow-sm"
  >
    <div>
      <label class="block text-sm font-medium text-[var(--text-muted)] mb-3"
        >Profile Picture</label
      >
      <div class="flex items-center gap-6">
        <img
          id="admin-image-preview"
          src="https://picsum.photos/seed/admin-avatar/150/150.jpg"
          alt="Admin"
          class="w-24 h-24 rounded-full object-cover border-2 border-[var(--border-color)]"
        />
        <div>
          <input
            type="file"
            id="admin-image-input"
            class="hidden"
            accept="image/*"
            onchange="previewAdminImage(event)"
          />
          <button
            type="button"
            onclick="document.getElementById('admin-image-input').click()"
            class="bg-gray-100 border border-[var(--border-color)] hover:bg-gray-200 text-[var(--text-main)] px-4 py-2 rounded-lg text-sm font-medium transition-colors inline-flex items-center gap-2"
          >
            <span class="iconify text-base" data-icon="lucide:upload"></span>
            Choose File
          </button>
          <p class="text-xs text-[var(--text-faint)] mt-2">
            JPG, PNG or GIF. Max 2MB.
          </p>
        </div>
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium text-[var(--text-muted)] mb-1.5"
        >Name</label
      >
      <input
        type="text"
        placeholder="Enter your name"
        class="form-input w-full rounded-lg px-4 py-2.5 text-sm transition-colors"
      />
    </div>
    <div>
      <label class="block text-sm font-medium text-[var(--text-muted)] mb-1.5"
        >Website Name</label
      >
      <input
        type="text"
        placeholder="Enter website name"
        class="form-input w-full rounded-lg px-4 py-2.5 text-sm transition-colors"
      />
    </div>
    <div class="pt-2 flex justify-end">
      <button
        type="submit"
        class="bg-[var(--color-primary)] hover:bg-[var(--color-primary-hover)] text-white px-6 py-2.5 rounded-lg text-sm font-medium transition-colors shadow-sm"
      >
        Save Changes
      </button>
    </div>
  </form>
</div>
