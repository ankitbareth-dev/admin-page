<div class="max-w-3xl mx-auto">
  <div class="mb-8">
    <h1 class="text-2xl md:text-3xl font-semibold text-[var(--text-main)] mb-2">
      Settings
    </h1>
    <p class="text-[var(--text-faint)] text-sm">
      Update your login credentials.
    </p>
  </div>
  <form
    class="space-y-6 bg-[var(--bg-card)] border border-[var(--border-color)] rounded-xl p-6 md:p-8 shadow-sm"
  >
    <div>
      <label class="block text-sm font-medium text-[var(--text-muted)] mb-1.5"
        >User Login Email</label
      >
      <input
        type="email"
        placeholder="Enter login email"
        class="form-input w-full rounded-lg px-4 py-2.5 text-sm transition-colors"
      />
    </div>
    <div>
      <label class="block text-sm font-medium text-[var(--text-muted)] mb-1.5"
        >New Password</label
      >
      <input
        type="password"
        placeholder="Enter new password"
        class="form-input w-full rounded-lg px-4 py-2.5 text-sm transition-colors"
      />
    </div>
    <div>
      <label class="block text-sm font-medium text-[var(--text-muted)] mb-1.5"
        >Confirm Password</label
      >
      <input
        type="password"
        placeholder="Confirm new password"
        class="form-input w-full rounded-lg px-4 py-2.5 text-sm transition-colors"
      />
    </div>
    <div class="pt-2 flex justify-end">
      <button
        type="submit"
        class="bg-[var(--color-primary)] hover:bg-[var(--color-primary-hover)] text-white px-6 py-2.5 rounded-lg text-sm font-medium transition-colors shadow-sm"
      >
        Update Settings
      </button>
    </div>
  </form>
</div>
