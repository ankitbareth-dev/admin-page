<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <style>
      /* Sidebar Collapse Logic */
      #sidebar {
        transition: width 300ms ease-in-out;
      }
      #sidebar.collapsed {
        width: 5rem; /* 80px */
      }
      #sidebar.collapsed .nav-text,
      #sidebar.collapsed .sidebar-title {
        display: none;
      }
      #sidebar.collapsed .nav-item {
        justify-content: center;
        padding-left: 0;
        padding-right: 0;
      }
      #sidebar.collapsed #toggle-icon {
        transform: rotate(180deg);
      }
    </style>
  </head>
  <body
    class="bg-[#050505] text-white font-sans antialiased h-screen overflow-hidden"
  >
    <!-- SHELL -->
    <div class="flex h-screen">
      <!-- SIDEBAR -->
      <aside
        id="sidebar"
        class="w-64 bg-[#0A0A0A] border-r border-white/[0.06] flex flex-col flex-shrink-0 relative"
      >
        <!-- Top: Riverside Resort -->
        <div class="h-16 flex items-center px-4 border-b border-white/[0.06]">
          <span
            class="sidebar-title text-lg font-semibold text-white whitespace-nowrap"
            >Riverside Resort</span
          >
        </div>

        <!-- Navigation -->
        <nav
          class="flex-1 py-4 px-2 space-y-1 overflow-y-auto overflow-x-hidden"
        >
          <a
            href="#"
            class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-white/[0.05] transition-colors"
          >
            <span
              class="iconify text-xl flex-shrink-0 text-indigo-400"
              data-icon="lucide:layout-dashboard"
            ></span>
            <span class="nav-text text-sm whitespace-nowrap font-medium"
              >Homepage</span
            >
          </a>

          <a
            href="#"
            class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-white/[0.05] transition-colors"
          >
            <span
              class="iconify text-xl flex-shrink-0"
              data-icon="lucide:user"
            ></span>
            <span class="nav-text text-sm whitespace-nowrap">About Owner</span>
          </a>

          <a
            href="#"
            class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-white/[0.05] transition-colors"
          >
            <span
              class="iconify text-xl flex-shrink-0"
              data-icon="lucide:building"
            ></span>
            <span class="nav-text text-sm whitespace-nowrap"
              >Edit Property</span
            >
          </a>

          <a
            href="#"
            class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-white/[0.05] transition-colors"
          >
            <span
              class="iconify text-xl flex-shrink-0"
              data-icon="lucide:mail"
            ></span>
            <span class="nav-text text-sm whitespace-nowrap">Contact Us</span>
          </a>

          <a
            href="#"
            class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-white/[0.05] transition-colors"
          >
            <span
              class="iconify text-xl flex-shrink-0"
              data-icon="lucide:share-2"
            ></span>
            <span class="nav-text text-sm whitespace-nowrap">Social Links</span>
          </a>
        </nav>

        <!-- Bottom Navigation -->
        <div class="py-4 px-2 border-t border-white/[0.06] space-y-1">
          <a
            href="#"
            class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-white/[0.05] transition-colors"
          >
            <span
              class="iconify text-xl flex-shrink-0"
              data-icon="lucide:user-circle"
            ></span>
            <span class="nav-text text-sm whitespace-nowrap">Profile</span>
          </a>

          <a
            href="#"
            class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-white/[0.05] transition-colors"
          >
            <span
              class="iconify text-xl flex-shrink-0"
              data-icon="lucide:settings"
            ></span>
            <span class="nav-text text-sm whitespace-nowrap">Setting</span>
          </a>

          <a
            href="#"
            class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-500 hover:text-red-400 hover:bg-red-400/10 transition-colors"
          >
            <span
              class="iconify text-xl flex-shrink-0"
              data-icon="lucide:log-out"
            ></span>
            <span class="nav-text text-sm whitespace-nowrap">Logout</span>
          </a>
        </div>

        <!-- Collapse Toggle Button (Vertically Centered) -->
        <button
          onclick="toggleSidebar()"
          class="absolute -right-3 top-1/2 -translate-y-1/2 w-6 h-6 bg-[#0A0A0A] border border-white/[0.1] rounded-full flex items-center justify-center text-gray-500 hover:text-white hover:border-white/20 transition-colors z-10"
        >
          <span
            id="toggle-icon"
            class="iconify text-sm transition-transform duration-300"
            data-icon="lucide:chevron-left"
          ></span>
        </button>
      </aside>

      <!-- MAIN AREA -->
      <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <!-- HEADER -->
        <header
          class="h-16 bg-[#0A0A0A] border-b border-white/[0.06] flex-shrink-0"
        >
          <!-- Your header content goes here -->
        </header>

        <!-- MAIN CONTENT -->
        <main class="flex-1 overflow-y-auto p-6 lg:p-8 bg-[#050505]">
          <div class="max-w-3xl mx-auto">
            <!-- Page Header -->
            <div class="mb-8">
              <h1 class="text-2xl md:text-3xl font-semibold text-white mb-2">
                Update your content easily
              </h1>
              <p class="text-gray-500 text-sm">
                Manage your homepage details from here.
              </p>
            </div>

            <!-- Form Card -->
            <form
              class="space-y-6 bg-[#0A0A0A] border border-white/[0.06] rounded-xl p-6 md:p-8"
            >
              <!-- Welcome Heading -->
              <div>
                <label class="block text-sm font-medium text-gray-400 mb-1.5"
                  >Welcome Heading</label
                >
                <input
                  type="text"
                  placeholder="Enter welcome heading"
                  class="w-full bg-[#050505] border border-white/[0.1] rounded-lg px-4 py-2.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors"
                />
              </div>

              <!-- Heading -->
              <div>
                <label class="block text-sm font-medium text-gray-400 mb-1.5"
                  >Heading</label
                >
                <input
                  type="text"
                  placeholder="Enter main heading"
                  class="w-full bg-[#050505] border border-white/[0.1] rounded-lg px-4 py-2.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors"
                />
              </div>

              <!-- Content -->
              <div>
                <label class="block text-sm font-medium text-gray-400 mb-1.5"
                  >Content</label
                >
                <textarea
                  rows="4"
                  placeholder="Enter content..."
                  class="w-full bg-[#050505] border border-white/[0.1] rounded-lg px-4 py-2.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors resize-y"
                ></textarea>
              </div>

              <!-- About Heading -->
              <div>
                <label class="block text-sm font-medium text-gray-400 mb-1.5"
                  >About Heading</label
                >
                <input
                  type="text"
                  placeholder="Enter about heading"
                  class="w-full bg-[#050505] border border-white/[0.1] rounded-lg px-4 py-2.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors"
                />
              </div>

              <!-- About Content -->
              <div>
                <label class="block text-sm font-medium text-gray-400 mb-1.5"
                  >About Content</label
                >
                <textarea
                  rows="4"
                  placeholder="Enter about content..."
                  class="w-full bg-[#050505] border border-white/[0.1] rounded-lg px-4 py-2.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors resize-y"
                ></textarea>
              </div>

              <!-- Submit Button -->
              <div class="pt-2 flex justify-end">
                <button
                  type="submit"
                  class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2.5 rounded-lg text-sm font-medium transition-colors"
                >
                  Save Changes
                </button>
              </div>
            </form>
          </div>
        </main>
      </div>
    </div>

    <script>
      function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("collapsed");
      }
    </script>
  </body>
</html>
